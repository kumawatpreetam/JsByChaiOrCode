<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMIcalculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="heading-box">
      <h1>BMI Calculator</h1>
    </div>
    <div class="container">
      <div class="form-box">
        <form>
          <p>
            <label>Height in CM:</label
            ><input type="text" id="height" placeholder="height in CM" />
          </p>
          <p>
            <label>Weight in KG:</label
            ><input type="text" id="weight" placeholder="weight in kg" />
          </p>
          <button>Calculate</button>
          <div id="result"></div>
          <div id="weight-result"></div>

          <div id="weight-guid">
            <h3>BMI Weight Guid</h3>
            <p>Under Weight = Less than 18.6</p>
            <p>Normal Range = 18.6 amd 24.9</p>
            <p>Overweight = Greater than 24.9</p>
          </div>
        </form>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>

<!-- //Form is Submit using GET and POST method in js -->
